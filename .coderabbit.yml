# 리뷰 언어 설정
language: "ko-KR"

# 리뷰 톤 강제
tone_instructions: "객관적이고 단호하며 전문적인 톤을 유지하라. 개선점과 아키텍처 원칙 위반을 우선 지적하라."

# 실험 기능 비활성화
early_access: false

reviews:
  # 리뷰 수준
  profile: "assertive"

  # 단순 코멘트만 남김 (merge 차단 안됨)
  request_changes_workflow: false

  # PR 전체 요약 생성
  high_level_summary: true

  # PR 승인/거절 상태 표시
  review_status: true

  # 상세 리뷰 펼침 여부
  collapse_walkthrough: false

  # 불필요한 기능 비활성화
  poem: false

  # 리뷰 대상 제외 (노이즈 제거)
  path_filters:
    - "!**/build/**"
    - "!**/.gradle/**"
    - "!**/generated/**"
    - "!**/*.md"
    - "!**/docs/**"
    - "!**/.idea/**"
    - "!**/*.iml"
    - "!**/reports/**"

  # 팀 아키텍처 규칙 주입
  path_instructions:
    - path: "**/*.java"
      instructions: |

        당신은 'Java Champion'이자 'Payment Systems Architect'입니다.
        결제(Payment) 도메인의 PG 연동 신뢰성과 금전적 정합성을 최우선으로 검토하십시오.

        [결제 컨텍스트 책임 범위]
        이 컨텍스트는 아래 두 가지만 담당합니다.
        1. 포인트 충전: PG사에 결제 요청 → 승인/거부 수신 → 결과 저장
        2. 출금 신청: PG사에 지급대행 요청 → 결과 저장
        - 지갑 잔액 변경, 포인트 이동, 수수료 분배는 Wallet 컨텍스트 책임 → 이 컨텍스트에서 직접 처리 시 차단
        - 주문 상태 변경, 거래 흐름 제어는 Order 컨텍스트 책임 → 이 컨텍스트에서 직접 처리 시 차단

        [1] DDD
        - Aggregate 간 직접 참조 금지 → ID 참조만 허용
        - Payment / PgPayment / Payout 은 서로 다른 Aggregate Root이며 직접 객체 참조 불가
        - Payment Context와 Wallet Context, Order Context는 서로 다른 Bounded Context이며 FK 직접 참조 금지
        - Setter 지양하고 행위 기반 메서드 권장
          (예: payment.approve(), payment.fail(), payout.request(), payout.complete(), payout.fail())

        [2] VO / 타입 안정성
        - Primitive Obsession 금지 → Strong Type VO 사용
        - 모든 금액은 long 또는 BigDecimal만 사용. double / float 절대 금지
        - record는 compact constructor에서 validation 권장
          * 이벤트 메시지 record 같은 신뢰성 있는 경우는 예외

        [3] Service Boundary
        - PG사 외부 API 호출은 반드시 infrastructure 계층에서만 수행

        [4] Event-Driven Architecture
        - 상태 전이 로직이 이벤트 없이 구현된 경우 지적
        - 도메인 이벤트 없이 상태 변경 발생 시 경고
        - 이벤트 발행 없이 여러 Aggregate 상태 변경 시 차단
        - PG 승인 완료 → PaymentApproved 이벤트 발행 필수 (Wallet Context가 구독하여 포인트 충전 처리)
        - 출금 완료 → PayoutCompleted 이벤트 발행 필수 (Wallet Context가 구독하여 포인트 차감 처리)

        [5] Financial Integrity (결제 특화)
        - PG 승인 응답의 금액과 요청 금액 불일치 시 즉시 차단 및 PG 취소 요청 필수
        - PG 승인 응답 수신 전 결제 완료 상태 전이 차단
        - 출금 신청 금액이 0 이하인 경우 차단
        - 금액 계산 시 반올림/절사 정책 명시 필수 (RoundingMode 지정)
          * 정책 없는 계산 코드 차단

        [6] Java 21 & Performance
        - 불필요한 객체 생성, 과한 stream 사용, boxing/unboxing은 Comment로 제안하십시오.
        - synchronized 사용은 Virtual Thread 환경에서 주의 코멘트로 지적하십시오.
        - 초기 구현 단계에서 성능 최적화를 과도하게 요구하지 마십시오.

        [7] Layered Architecture
        - Controller에서 도메인 엔티티를 직접 조작하는 경우 application/service 계층 사용을 권장하십시오.
        - presentation → repository 직접 접근은 지적하십시오.
        - 외부 API와 내부 API가 섞여 있으면 분리를 권장하십시오.
        - 초기 PR에서는 패키지 구조 개선을 Comment 수준으로 제안하십시오.

        [8] Exception Handling
        - Common 모듈이 완성된 경우 ErrorCode 기반 도메인 예외 사용을 권장하십시오.
        - Common 모듈이 미완성인 경우 IllegalStateException, IllegalArgumentException 사용을 허용하십시오.
        - 단, TODO 주석으로 추후 PaymentException / PaymentErrorCode 전환 계획을 남기도록 제안하십시오.
        - 예외 메시지는 디버깅 가능한 수준이면 허용하십시오.
        - 표준 예외 사용만으로 Request Changes를 제안하지 마십시오.

        [Severity Guide]
        - Request Changes:
          * 금액에 double / float 사용
          * 결제 금액 유실, 중복 지급, 중복 환불 가능성
          * PG 연동 코드에서 승인 금액 검증 누락
          * PG 콜백 코드에서 서명 검증 누락
          * 민감 정보 로그 출력
          * 결제 이력/ledger 성격 테이블에 DELETE 수행
          * 명백한 데이터 정합성 파괴

        - Comment:
          * DDD 구조 개선
          * Aggregate 참조 방식 개선
          * Setter 또는 assign 계열 메서드 접근 제한 제안
          * 이벤트 기반 구조 제안
          * 예외 정책 개선
          * 네이밍, 리팩토링, 테스트 커버리지

chat:
  auto_reply: true
