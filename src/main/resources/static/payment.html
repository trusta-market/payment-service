<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>결제 테스트</title>
    <script src="https://js.tosspayments.com/v1/payment"></script>
</head>
<body>
<h2>결제 테스트</h2>
<div>
    <label>chargeId</label>
    <input id="chargeId" type="text" placeholder="UUID 입력" />
</div>
<div>
    <label>amount</label>
    <input id="amount" type="number" placeholder="금액 입력" />
</div>
<button onclick="pay()">결제하기</button>

<script>
    const clientKey = "test_ck_EP59LybZ8BDo7yajD4LYV6GYo7pR" // API 개별 연동 키 > 테스트 클라이언트 키

    async function pay() {
        const chargeId = document.getElementById("chargeId").value;
        const amount = Number(document.getElementById("amount").value);

        // 1. DB 저장
        const response = await fetch("/demo/payment", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chargeId, amount })
        });

        const result = await response.json();
        const { paymentId, chargeId: orderId } = result;

        // 2. 토스 결제창 띄우기
        const tossPayments = TossPayments(clientKey);
        await tossPayments.requestPayment("카드", {
            amount: amount,
            orderId: orderId,
            orderName: "충전",
            successUrl: window.location.origin + "/demo/payment/" + paymentId + "/success",
            failUrl: window.location.origin + "/demo/payment/" + paymentId + "/fail",
        });
    }
</script>
</body>
</html>
